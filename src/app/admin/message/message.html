<div class="container mb-5">
    <div class="row">
        <div >
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="fw-bold m-0 text-primary">{{ activeTab | titlecase }}</h4>
                </div>

                <div class="card-body p-4">
                    <div class="chat-wrapper">
                        <div class="chat-window bg-light rounded p-3 mb-3">
                            <div *ngFor="let msg of chats" [ngClass]="msg.sender === 'You' ? 'text-end' : 'text-start'"
                                class="mb-3">
                                <div [ngClass]="msg.sender === 'You' ? 'bg-primary text-white' : 'bg-white shadow-sm'"
                                    class="d-inline-block px-3 py-2 rounded-3 shadow-sm max-vw-75">
                                    <p class="m-0">{{ msg.text }}</p>
                                    <small class="d-block opacity-75 mt-1">{{ msg.time }}</small>
                                </div>
                            </div>
                            <div class="d-flex align-items-end mb-3">
                                <div class="flex-shrink-0 me-2">
                                    <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white"
                                        style="width: 32px; height: 32px; font-size: 12px;">
                                        IN
                                    </div>
                                </div>
                                <div class="bg-white shadow-sm p-3 rounded-4 border-start border-4 border-primary"
                                    style="max-width: 70%;">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <strong class="small text-primary">Instructor (Online)</strong>
                                        <span class="dot-online ml-1"></span>
                                    </div>
                                    <p class="m-0 small text-dark">Don't forget to check the new 'RxJS' resources in the
                                        Announcements tab!</p>
                                </div>
                            </div>

                            <div class="text-muted small italic ms-5 mb-3 animate-pulse">
                                Instructor is typing...
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="text" class="form-control border-0 shadow-sm" [(ngModel)]="newMessage"
                                placeholder="Ask a doubt..." (keyup.enter)="sendMessage()">
                            <button class="btn btn-primary px-4 shadow-sm" (click)="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
