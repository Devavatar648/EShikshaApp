<div class="container d-flex justify-content-center align-items-center loginBg" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 20px;">
    <div class="text-center mb-4">
      <img src="./EportalLogo.png" alt="Logo" height="50" class="mb-3" style="border-radius: 25px; cursor: pointer;"
        (click)="goToHome()">
      <h3 class="fw-bold text-success">E-Shiksha Institute</h3>
      <p class="text-muted small">Sign in to continue your journey</p>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-secondary">EMAIL<span class="text-danger">*</span></label>

        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-success"><i class="bi bi-envelope"></i></span>
          <input type="email" formControlName="email" class="form-control border-start-0 ps-0"
            placeholder="user@domain.com" id="email">
        </div>
        <label for="email">
          @if(email?.touched && email?.invalid){
            @if(email?.hasError('required')){
                <span class="text-danger">This Field is required</span>
            }
          }
        </label>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold text-secondary">PASSWORD<span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 text-success"><i class="bi bi-lock"></i></span>
          <input type="password" formControlName="password" class="form-control border-start-0 ps-0"
            placeholder="••••••" id="password">
        </div>
        <label for="password">
          @if(password?.touched && password?.invalid){
            @if(password?.hasError('required')){
            <span class="text-danger">This Field is required</span>
            }
          }
        </label>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-success py-2 fw-bold shadow-sm" [disabled]="loginForm.invalid">
          Login Now
        </button>
      </div>
    </form>
    <div class="text-center mt-2">
      <p class="text-muted small mb-0">Don't have an account?</p>
      <a [routerLink]="['/register']" class="text-success fw-bold text-decoration-none small">
        Create a new account
      </a>
    </div>
  </div>
</div>
