
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h2 class="fw-bold text-dark mb-1">Explore All Courses</h2>
      <p class="text-muted">Pick a course and start your learning journey today.</p>
    </div>
    <span class="badge bg-primary px-3 py-2 rounded-pill">
      {{ courseList().length }} Courses Available
    </span>
  </div>

  <div class="row g-4">
    @for (course of courseList(); track course._id) {
      
      <div class="col-md-6 col-lg-4 col-xl-3">
        <app-course-card [course]="course"></app-course-card>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <div class="bg-light p-5 rounded-4 border border-dashed">
          <i class="bi bi-journal-x display-1 text-muted"></i>
          <h4 class="mt-3 text-dark">No courses created yet</h4>
          <p class="text-muted">Once you create a course in the management panel, it will appear here.</p>
        </div>
      </div>
    }
  </div>
</div>
